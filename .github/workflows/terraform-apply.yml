name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'infra/environments/**'
      - 'infra/modules/**'
  # Production is applied manually, not on every push. This AWS account is a
  # free-plan account that allows only ONE RDS instance at a time; `dev` already
  # holds that slot, so an automatic prod apply fails with InstanceQuotaExceeded.
  # Free the dev slot (terraform destroy dev) before dispatching a prod apply.
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to apply
        type: choice
        options:
          - dev
          - production
        default: dev

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-dev:
    name: Apply Dev
    # Runs on push to main, or on a manual dispatch that selects "dev".
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infra/environments/dev
    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
      TF_VAR_billing_alert_email: ${{ vars.TF_VAR_BILLING_ALERT_EMAIL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.6

      - name: Terraform Init
        run: terraform init -no-color -input=false -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color -input=false

  apply-production:
    name: Apply Production
    # Manual-only: never runs automatically (would exceed the free-plan RDS quota).
    # No dependency on apply-dev — prod requires the dev slot to be freed first.
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra/environments/production
    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
      TF_VAR_billing_alert_email: ${{ vars.TF_VAR_BILLING_ALERT_EMAIL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.6

      - name: Terraform Init
        run: terraform init -no-color -input=false -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color -input=false
