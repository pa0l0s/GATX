name: ci-cd

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet restore backend/GATX.sln
      - run: dotnet build backend/GATX.sln --configuration Release --no-restore
      - run: dotnet test backend/GATX.sln --configuration Release --no-build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f backend/src/Gatx.WebApi/Dockerfile -t gatx-api .
      - run: docker build -f frontend/apps/assembly-manager/Dockerfile -t gatx-frontend .
