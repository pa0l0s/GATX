services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gatx
      POSTGRES_USER: gatx
      POSTGRES_PASSWORD: gatx_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatx -d gatx"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/src/Gatx.WebApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=gatx;Username=gatx;Password=gatx_dev_password
      Frontend__Origin: http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/apps/assembly-manager/Dockerfile
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  postgres-data:
